<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Impresiones - Costa Rica</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --panel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --brand-color: #4f46e5;
            --brand-hover: #4338ca;
            --success-color: #059669;
            --border-color: #cbd5e1;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --card-bg: #fafafa;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a;
            --panel-bg: #1e293b;
            --text-dark: #f8fafc;
            --text-muted: #94a3b8;
            --brand-color: #818cf8;
            --brand-hover: #6366f1;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .top-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .business-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px dashed var(--brand-color);
            color: var(--text-dark);
            font-size: 1.4rem;
            font-weight: 700;
            padding: 5px;
            width: 300px;
        }

        .btn-theme {
            background-color: var(--panel-bg);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-nube {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-nube:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }

        .btn-alerta-parpadeo {
            animation: parpadeoRojo 1.2s infinite ease-in-out;
        }

        @keyframes parpadeoRojo {
            0% { background-color: #4f46e5; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { background-color: #ef4444; box-shadow: 0 0 12px 6px rgba(239, 68, 68, 0.4); }
            100% { background-color: #4f46e5; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .caja-total-box {
            background-color: #059669;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.3);
        }

        .window-laptop {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            margin-bottom: 25px;
        }

        .panel-inputs { padding: 35px; border-right: 1px solid var(--border-color); }

        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; }

        label { font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }

        .input-pages, .input-pago, select {
            height: 48px;
            padding: 0 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-dark);
            background-color: var(--bg-main);
        }

        .input-pages, select { color: var(--brand-color); }

        .input-pago { color: var(--success-color); border-color: #a7f3d0; background-color: #f0fdf4; }
        [data-theme="dark"] .input-pago { background-color: #064e3b; border-color: #047857; }

        .btn-calcular {
            width: 100%;
            height: 48px;
            background-color: var(--brand-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
            transition: all 0.2s ease;
        }

        .btn-calcular:hover { background-color: var(--brand-hover); }
        .btn-calcular.bloqueado { background-color: var(--danger-color) !important; cursor: not-allowed; }

        .btn-tomar-orden {
            height: 36px;
            background-color: var(--panel-bg);
            color: var(--brand-color);
            border: 2px solid var(--brand-color);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            padding: 0 14px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-tomar-orden:hover { background-color: var(--brand-color); color: white; }

        .btn-nube-wrapper { position: relative; display: inline-block; }

        .badge-pedidos {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--danger-color);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 0 0 2px var(--panel-bg);
        }

        .panel-results { padding: 35px; background-color: var(--bg-main); display: flex; flex-direction: column; justify-content: center; }

        .box-total-price {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        .box-total-price .price-value { font-size: 3rem; font-weight: 800; margin: 5px 0 0 0; }

        .strike-discount {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ef4444;
            text-decoration: line-through;
            margin-top: 4px;
            display: none;
        }

        .mini-stats {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .vuelto-box { border-left: 5px solid var(--success-color); background-color: #f0fdf4; }
        [data-theme="dark"] .vuelto-box { background-color: #064e3b; }

        .vouchers-section {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            padding: 30px;
            box-sizing: border-box;
        }

        .vouchers-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }

        .vouchers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; }

        .voucher-ticket { background: var(--card-bg); border: 1px dashed var(--border-color); padding: 15px; border-radius: 8px; position: relative; }

        .voucher-ticket .num { font-size: 0.75rem; font-weight: 700; color: var(--brand-color); text-transform: uppercase; }

        .voucher-ticket .date { font-size: 0.75rem; color: var(--text-muted); float: right; margin-right: 25px; }

        .btn-delete-individual {
            position: absolute; top: 10px; right: 10px; background: none; border: none;
            color: var(--text-muted); font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }

        .btn-delete-individual:hover { color: var(--danger-color); background-color: #fee2e2; }

        .btn-marcar-listo {
            position: absolute; top: 8px; right: 32px; background: none; border: none;
            color: var(--text-muted); font-size: 1rem; cursor: pointer; line-height: 1;
            padding: 2px;
        }

        .btn-marcar-listo:hover { color: #16a34a; }

        .btn-marcar-listo.activo { color: #16a34a; cursor: default; }

        .voucher-ticket .detalles { margin: 10px 0; font-size: 0.85rem; line-height: 1.4; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; color: var(--text-muted); }

        .voucher-ticket .monto { font-size: 1.2rem; font-weight: 800; display: flex; justify-content: space-between; }

        .btn-print-ticket {
            width: 100%; background-color: var(--bg-main); color: var(--text-dark);
            border: 1px solid var(--border-color); padding: 6px; margin-top: 10px; border-radius: 4px; cursor: pointer;
        }

        .empty-msg { color: var(--text-muted); font-style: italic; grid-column: span 3; text-align: center; padding: 20px; }

        .contenedor-descargas {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn-open-doc {
            width: 100%;
            background-color: #fb923c;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.80rem;
            transition: background 0.2s ease;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn-open-doc:hover { background-color: #f97316; }

        .btn-open-images {
            width: 100%;
            background-color: #0ea5e9;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.80rem;
            transition: background 0.2s ease;
            text-align: center;
        }
        .btn-open-images:hover { background-color: #0284c7; }

        @media print {
            body * { visibility: hidden; }
            .print-active, .print-active * { visibility: visible; }
            .print-active { position: absolute; left: 0; top: 0; width: 80mm; border: none; background: white; color: black; }
            .btn-print-ticket, .btn-delete-individual, .contenedor-descargas { display: none !important; }
        }

        /* ── PANEL DE CLIENTES ─────────────────────────────────── */
        .btn-clientes {
            background-color: #7c3aed;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-clientes:hover { background-color: #6d28d9; }

        .overlay-clientes {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            z-index: 100;
            align-items: flex-start;
            justify-content: center;
            padding: 30px 15px;
            overflow-y: auto;
        }
        .overlay-clientes.visible { display: flex; }

        .panel-clientes {
            background: var(--panel-bg);
            color: var(--text-dark);
            border-radius: 14px;
            width: 100%;
            max-width: 560px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .panel-clientes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .panel-clientes-header h2 { margin: 0; font-size: 1.15rem; }
        .btn-cerrar-clientes {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .input-buscar-cliente {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-dark);
            font-size: 0.95rem;
            margin-bottom: 14px;
            box-sizing: border-box;
        }
        .fila-cliente {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .fila-cliente-info { flex: 1; min-width: 140px; }
        .fila-cliente-nombre { font-weight: 700; font-size: 0.92rem; }
        .fila-cliente-datos { font-size: 0.78rem; color: var(--text-muted); }
        .fila-cliente-credito {
            font-weight: 800;
            color: #7c3aed;
            font-size: 0.88rem;
            white-space: nowrap;
        }
        .fila-cliente-acciones {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .input-ajuste-credito {
            width: 64px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            color: var(--text-dark);
            font-size: 0.82rem;
        }
        .btn-ajuste-credito {
            border: none;
            border-radius: 6px;
            padding: 6px 9px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.82rem;
        }
        .btn-ajuste-credito.sumar { background: #059669; color: #fff; }
        .btn-ajuste-credito.restar { background: #ef4444; color: #fff; }
        .btn-borrar-cliente {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.15rem;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
        }
        .btn-borrar-cliente:hover { color: #ef4444; }

        .caja-nuevo-cliente {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
        }
        .caja-nuevo-cliente input {
            flex: 1;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-dark);
            font-size: 0.85rem;
            min-width: 0;
        }
        .btn-agregar-cliente {
            background: var(--brand-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .fila-cliente.guardado-flash {
            animation: flashGuardado 0.9s ease;
        }
        @keyframes flashGuardado {
            0% { background: #bbf7d0; }
            100% { background: var(--card-bg); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <input type="text" id="nombreNegocio" class="business-name-input" value="Mi Centro de Impresión" oninput="guardarConfig()" title="Nombre de tu negocio">
    
    <div class="btn-nube-wrapper">
        <button id="btnNubePrincipal" class="btn-nube" onclick="sincronizarPedidosNube()"> Pedidos en Línea</button>
        <span class="badge-pedidos" id="badgePedidos">0</span>
    </div>
    
    <div class="caja-total-box">Ventas Hoy: <span id="montoCaja">₡0</span></div>
    
    <button class="btn-clientes" onclick="abrirPanelClientes()">👥 Clientes</button>
    <button class="btn-theme" onclick="cambiarModo()">🌓 Cambiar Vista</button>
</div>

<div class="overlay-clientes" id="overlayClientes" onclick="if(event.target===this) cerrarPanelClientes()">
    <div class="panel-clientes">
        <div class="panel-clientes-header">
            <h2>👥 Tus Clientes</h2>
            <button class="btn-cerrar-clientes" onclick="cerrarPanelClientes()">×</button>
        </div>
        <input type="text" id="buscarCliente" class="input-buscar-cliente" placeholder="Buscar por nombre..." oninput="renderizarListaClientes()">

        <div class="caja-nuevo-cliente">
            <input type="text" id="nuevoClienteNombre" placeholder="Nombre">
            <input type="tel" id="nuevoClienteTelefono" placeholder="Teléfono">
            <button type="button" class="btn-agregar-cliente" onclick="agregarClienteManual()">+ Agregar</button>
        </div>

        <div id="listaClientes"><div class="empty-msg">Cargando...</div></div>
    </div>
</div>

<div class="window-laptop">
    <div class="panel-inputs">
        <form onsubmit="event.preventDefault(); procesarVenta();">
            <div class="form-group">
                <label for="cantidad">¿Cuántas páginas vas a imprimir?</label>
                <input type="number" id="cantidad" class="input-pages" value="1" min="1" required autofocus>
            </div>

            <div class="form-group">
                <label for="tipoImpresion">Color / Tipo de Trabajo</label>
                <select id="tipoImpresion" onchange="calcularPreciosBase()">
                    <option value="bn">Blanco y Negro (Monocromático) [₡50]</option>
                    <option value="color">A Color (Texto con gráficos) [₡100]</option>
                    <option value="foto">A Color Completo (Fotografías) [₡300]</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descuento">Descuento Manual Extra</label>
                <select id="descuento" onchange="calcularPreciosBase()">
                    <option value="0">Sin descuento adicional</option>
                    <option value="5">Rebajar 5%</option>
                    <option value="10">Rebajar 10%</option>
                    <option value="20">Rebajar 20%</option>
                </select>
            </div>

            <div class="form-group" style="margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--border-color);">
                <label for="pagoCliente" style="color: var(--success-color);">¿Con cuánto paga el cliente? (₡)</label>
                <input type="number" id="pagoCliente" class="input-pago" placeholder="Ej: 5000" min="0" oninput="calcularVuelto()">
            </div>

            <button type="submit" id="btnAccion" class="btn-calcular">Registrar Trabajo y Guardar Voucher</button>
        </form>
    </div>

    <div class="panel-results">
        <div class="box-total-price">
            <div class="title-label">Total Neto</div>
            <div class="price-value" id="totalCobrar">₡0</div>
            <div class="strike-discount" id="antesDescuento">Antes: ₡0</div>
        </div>

        <div class="mini-stats">
            <span>Costo unitario aplicado:</span>
            <strong id="precioPorHoja">₡0</strong>
        </div>

        <div class="mini-stats vuelto-box">
            <span>Vuelto a entregar:</span>
            <strong id="vueltoCliente">₡0</strong>
        </div>
    </div>
</div>

<div class="vouchers-section">
    <div class="vouchers-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <h2 style="margin:0;">Vouchers Guardados (Historial Activo)</h2>
            <button type="button" id="btnTomarOrden" class="btn-tomar-orden" onclick="tomarOrden()"> Tomar Orden</button>
        </div>
        <button class="btn-clear" onclick="limpiarHistorial()">Borrar Historial Completo</button>
    </div>
    <div class="vouchers-grid" id="listaVouchers"></div>
</div>

<script>
    const TARIFAS = {
        bn:    { minorista: 50,  mediano: 60,  mayorista: 40, label: "Blanco y Negro" },
        color: { minorista: 100, mediano: 85, mayorista: 70, label: "A Color" },
        foto:  { minorista: 300, mediano: 250, mayorista: 200, label: "Full Color / Foto" }
    };

    let precioFinalGlobal = 0;
    let historialVouchers = [];
    let ultimoConteoPendientes = 0;

    // Configuración de CallMeBot: envía un WhatsApp automático cuando llega un pedido nuevo
    const CALLMEBOT_CONFIG = {
        telefono: "50661677144",
        apikey: "3527917"
    };

    function enviarAlertaWhatsApp(mensaje) {
        const url = `https://api.callmebot.com/whatsapp.php?phone=${CALLMEBOT_CONFIG.telefono}&text=${encodeURIComponent(mensaje)}&apikey=${CALLMEBOT_CONFIG.apikey}`;
        fetch(url).catch(err => console.log("No se pudo enviar la alerta de WhatsApp:", err));
    }
    let voucherEditandoId = null;

    const FIREBASE_URL = "https://proyector-fc12f-default-rtdb.firebaseio.com";

    window.onload = function() {
        try {
            if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            if (localStorage.getItem('nombreNegocio')) document.getElementById('nombreNegocio').value = localStorage.getItem('nombreNegocio');
            
            const guardado = localStorage.getItem('historialVouchers');
            if (guardado) {
                historialVouchers = JSON.parse(guardado);
            }

            // Reinicio automático a medianoche: si la última vez que se usó la app fue
            // un día distinto al de hoy, borramos las facturas viejas automáticamente
            // (igual que si tocaras "Borrar Historial Completo", pero sin tener que hacerlo a mano).
            const fechaHoy = new Date().toLocaleDateString('es-CR');
            const fechaGuardada = localStorage.getItem('fechaUltimoUso');
            if (fechaGuardada && fechaGuardada !== fechaHoy) {
                historialVouchers = [];
                localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers));
            }
            localStorage.setItem('fechaUltimoUso', fechaHoy);
        } catch (e) {
            console.log("El navegador bloqueó LocalStorage. Usando memoria RAM interna.");
        }
        renderizarVouchers();
        calcularPreciosBase();
        iniciarEscuchaFirebaseTaller();

        // CORRECCIÓN DE AUDIO: Fuerza la inicialización del canal al interactuar
        const forzarActivacionVoz = function() {
            if ('speechSynthesis' in window) {
                try {
                    window.speechSynthesis.cancel();
                    let textoPrueba = new SpeechSynthesisUtterance("");
                    textoPrueba.volume = 0; // Silencioso solo para abrir canal
                    window.speechSynthesis.speak(textoPrueba);
                } catch(e){}
            }
            // Remueve los listeners para que no gaste memoria tras activarse la primera vez
            document.removeEventListener('click', forzarActivacionVoz);
            document.removeEventListener('touchstart', forzarActivacionVoz);
            document.removeEventListener('keydown', forzarActivacionVoz);
        };
        document.addEventListener('click', forzarActivacionVoz);
        document.addEventListener('touchstart', forzarActivacionVoz);
        document.addEventListener('keydown', forzarActivacionVoz);
    };

    function emitirNotificacionVoz() {
        if (!('speechSynthesis' in window)) return;
        try {
            window.speechSynthesis.cancel(); // Detiene cualquier audio colgado anterior
            const mensaje = new SpeechSynthesisUtterance("Tienes una notificación, un pedido pendiente para ver");
            mensaje.lang = "es-CR";
            mensaje.rate = 0.95;
            mensaje.pitch = 1.0;
            mensaje.volume = 1.0;
            
            let voces = window.speechSynthesis.getVoices();
            let vozSeleccionada = voces.find(v => v.lang.includes('es-CR')) ||

        // -- ESCUCHA EN TIEMPO REAL (Firebase SSE) --
    let _sseTaller = null;

    function procesarDatosTaller(record) {
        const fechaHoy = new Date().toLocaleDateString('es-CR');
        if (localStorage.getItem('fechaUltimoUso') !== fechaHoy) {
            historialVouchers = [];
            try {
                localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers));
                localStorage.setItem('fechaUltimoUso', fechaHoy);
            } catch (e) {}
            renderizarVouchers();
        }
        if (!record) record = {};
        let pedidosNube = Array.isArray(record) ? record : (record.pedidos || []);

        // Reflejar en los tickets ya sincronizados si el cliente canceló el pedido
        let huboCambioCancelado = false;
        pedidosNube.forEach(p => {
            if (p.cancelado) {
                const v = historialVouchers.find(x => x.id === p.id);
                if (v && !v.cancelado) {
                    v.cancelado = true;
                    huboCambioCancelado = true;
                }
            }
        });
        if (huboCambioCancelado) {
            try { localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers)); } catch (e) {}
            renderizarVouchers();
        }

        let pendientes = pedidosNube.filter(p => p.estado === "Pendiente");
        const badge = document.getElementById('badgePedidos');
        const btnNube = document.getElementById('btnNubePrincipal');
        if (pendientes.length > 0) {
            badge.textContent = pendientes.length;
            badge.style.display = "flex";
            btnNube.classList.add('btn-alerta-parpadeo');
            if (pendientes.length > ultimoConteoPendientes) {
                emitirNotificacionVoz();
                const nuevos = pendientes.length - ultimoConteoPendientes;
                enviarAlertaWhatsApp("Pedido nuevo! Tienes " + nuevos + " pedido(s) nuevo(s) esperando. Total pendientes: " + pendientes.length + ".");
            }
        } else {
            badge.style.display = "none";
            btnNube.classList.remove('btn-alerta-parpadeo');
        }
        ultimoConteoPendientes = pendientes.length;
    }

    function iniciarEscuchaFirebaseTaller() {
        if (_sseTaller) { _sseTaller.close(); _sseTaller = null; }
        _sseTaller = new EventSource(FIREBASE_URL + "/db.json");
        _sseTaller.addEventListener('put', function(e) {
            try { procesarDatosTaller(JSON.parse(e.data).data); } catch(err) {}
        });
        _sseTaller.addEventListener('patch', function(e) {
            try { procesarDatosTaller(JSON.parse(e.data).data); } catch(err) {}
        });
        _sseTaller.onerror = function() {
            if (_sseTaller) { _sseTaller.close(); _sseTaller = null; }
            setTimeout(iniciarEscuchaFirebaseTaller, 5000);
        };
    }

    function sincronizarPedidosNube() {
        const btn = document.getElementById('btnNubePrincipal');
        btn.textContent = " Buscando...";
        btn.disabled = true;

        fetch(`${FIREBASE_URL}/db.json`)
        .then(res => res.json())
        .then(record => {
            if (!record) record = {};
            const esFormatoNuevo = !Array.isArray(record);
            let pedidosNube = esFormatoNuevo ? (record.pedidos || []) : record;
            const clientesNube = esFormatoNuevo ? (record.clientes || {}) : {};
            let pendientes = pedidosNube.filter(p => p.estado === "Pendiente");

            if (pendientes.length === 0) {
                alert("No hay nuevos pedidos pendientes en la nube.");
                btn.classList.remove('btn-alerta-parpadeo');
                return;
            }

            let nuevosContador = 0;

            pendientes.forEach(pedido => {
                let existe = historialVouchers.some(v => v.id === pedido.id);
                if (!existe) {
                    historialVouchers.unshift({
                        id: pedido.id,
                        hora: pedido.hora,
                        cantidad: pedido.cantidad,
                        tipoLabel: pedido.tipoLabel,
                        cliente: pedido.cliente || "",
                        telefono: pedido.telefono || "",
                        total: pedido.total,
                        pago: pedido.total, 
                        vuelto: 0,
                        documentoUrl: pedido.documentoUrl || "",
                        documentoNombre: pedido.documentoNombre || "",
                        detalleCopias: pedido.detalleCopias || "",
                        codigoReferido: pedido.codigoReferido || "",
                        cancelado: pedido.cancelado || false,
                        listo: pedido.listo || false,
                        creditoUsado: pedido.creditoUsado || 0,
                        totalSinCredito: pedido.totalSinCredito || (pedido.total + (pedido.creditoUsado || 0)),
                        modoImpresion: pedido.modoImpresion || "",
                        grapado: pedido.grapado || false,
                        engargolado: pedido.engargolado || false
                    });
                    nuevosContador++;
                    pedido.estado = "Procesado"; 
                }
            });

            if (nuevosContador > 0) {
                try { localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers)); } catch(e){}
                renderizarVouchers();
                alert(`¡Éxito! Se sincronizaron ${nuevosContador} nuevos pedidos de tus clientes.`);

                const badge = document.getElementById('badgePedidos');
                badge.style.display = "none";
                badge.textContent = "0";
                btn.classList.remove('btn-alerta-parpadeo');
                ultimoConteoPendientes = 0;

                fetch(`${FIREBASE_URL}/db.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pedidos: pedidosNube, clientes: clientesNube })
                });
            } else {
                alert("Los pedidos de la nube ya estaban cargados.");
                btn.classList.remove('btn-alerta-parpadeo');
            }
        })
        .catch(err => {
            console.error(err);
            alert("Error al conectar con la base de datos en la nube.");
        })
        .finally(() => {
            btn.textContent = " Pedidos en Línea";
            btn.disabled = false;
        });
    }

    function tomarOrden() {
        voucherEditandoId = null;
        document.getElementById('cantidad').value = "1";
        document.getElementById('descuento').value = "0";

    function calcularPreciosBase() {
        const cantidad = parseFloat(document.getElementById('cantidad').value) || 0;
        const tipo = document.getElementById('tipoImpresion').value;
        const rebajaPorcentaje = parseFloat(document.getElementById('descuento').value) || 0;

        let precioUnitario = (cantidad < 25) ? TARIFAS[tipo].minorista : (cantidad < 100) ? TARIFAS[tipo].mediano : TARIFAS[tipo].mayorista;

        const precioBaseOriginal = precioUnitario * Math.max(cantidad, 0);
        precioFinalGlobal = precioBaseOriginal - (precioBaseOriginal * (rebajaPorcentaje / 100));
        
        precioFinalGlobal = Math.ceil(precioFinalGlobal / 50) * 50;

        document.getElementById('totalCobrar').textContent = "₡" + precioFinalGlobal.toLocaleString('es-CR');
        document.getElementById('precioPorHoja').textContent = "₡" + precioUnitario + " c/u";

        const etiquetaAntes = document.getElementById('antesDescuento');
        if (rebajaPorcentaje > 0 && cantidad > 0) {
            etiquetaAntes.style.display = "block";
            let originalRedondeado = Math.ceil(precioBaseOriginal / 50) * 50;
            etiquetaAntes.textContent = "Antes: ₡" + originalRedondeado.toLocaleString('es-CR');
        } else {
            etiquetaAntes.style.display = "none";
        }

        calcularVuelto();
    }

    function calcularVuelto() {
        const pago = parseFloat(document.getElementById('pagoCliente').value) || 0;
        const contenedorVuelto = document.getElementById('vueltoCliente');
        const btnAccion = document.getElementById('btnAccion');
        const textoNormal = voucherEditandoId ? `Completar Cobro - Ticket #${voucherEditandoId}` : "Registrar Trabajo y Guardar Voucher";

        if (pago === 0) {
            contenedorVuelto.textContent = "₡0";
            contenedorVuelto.style.color = "var(--text-dark)";
            btnAccion.textContent = textoNormal;
            btnAccion.classList.remove('bloqueado');
            return;
        }

        const vuelto = pago - precioFinalGlobal;

        if (vuelto < 0) {
            contenedorVuelto.textContent = "Faltan ₡" + Math.abs(vuelto).toLocaleString('es-CR');
            contenedorVuelto.style.color = "#dc2626";
            btnAccion.textContent = "Falta Dinero (No se puede registrar)";
            btnAccion.classList.add('bloqueado');
        } else {
            contenedorVuelto.textContent = "₡" + vuelto.toLocaleString('es-CR');
            contenedorVuelto.style.color = "var(--success-color)";
            btnAccion.textContent = textoNormal;
            btnAccion.classList.remove('bloqueado');
        }
    }

    function cargarVoucherEnPanel(id) {
        const v = historialVouchers.find(x => x.id === id);
        if (!v) return;

        voucherEditandoId = id;
        document.getElementById('cantidad').value = v.cantidad;

        // El tipo se reconoce por palabras clave, no por coincidencia exacta del texto.
        // Así, pedidos "Mixto (...)" de la app del cliente (que llevan algo de color)
        // se marcan como "Color" en vez de quedar pegados en "Blanco y Negro".
        const etiqueta = v.tipoLabel || "";
        let tipoKey = "bn";
        if (etiqueta.includes("Foto") || etiqueta.includes("Full Color")) {
            tipoKey = "foto";
        } else if (etiqueta.includes("Color")) {
            tipoKey = "color";
        } else if (etiqueta.includes("Blanco y Negro")) {
            tipoKey = "bn";
        }
        document.getElementById('tipoImpresion').value = tipoKey;

        document.getElementById('descuento').value = "0";
        document.getElementById('pagoCliente').value = "";

        calcularPreciosBase();

        const btnAccion = document.getElementById('btnAccion');
        btnAccion.textContent = `Completar Cobro - Ticket #${id}`;

        document.querySelector('.panel-inputs').scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('pagoCliente').focus();
    }

    function procesarVenta() {
        calcularPreciosBase();
        const pago = parseFloat(document.getElementById('pagoCliente').value) || 0;
        
        if (pago > 0 && pago < precioFinalGlobal) {
            alert(`¡Operación Cancelada! Faltan colones.`);
            return;
        }

        const cantidad = document.getElementById('cantidad').value;
        const tipo = document.getElementById('tipoImpresion').value;
        const pagoEfectivo = pago === 0 ? precioFinalGlobal : pago;
        const vuelto = pagoEfectivo - precioFinalGlobal;
        const horaFormateada = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        if (voucherEditandoId) {
            const voucherExistente = historialVouchers.find(v => v.id === voucherEditandoId);
            if (voucherExistente) {
                voucherExistente.cantidad = cantidad;
                voucherExistente.tipoLabel = TARIFAS[tipo].label;
                voucherExistente.total = precioFinalGlobal;
                voucherExistente.pago = pagoEfectivo;
                voucherExistente.vuelto = vuelto;
                voucherExistente.hora = horaFormateada;
            }
            voucherEditandoId = null;
        } else {
            const nuevoVoucher = {
                id: Date.now().toString() + Math.floor(100 + Math.random() * 899).toString(),
                hora: horaFormateada,
                cantidad: cantidad,
                tipoLabel: TARIFAS[tipo].label,
                total: precioFinalGlobal,
                pago: pagoEfectivo,
                vuelto: vuelto,
                documentoUrl: "",
                documentoNombre: "",
                listo: false
            };

            historialVouchers.unshift(nuevoVoucher);
        }

        try { localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers)); } catch(e){}
        
        renderizarVouchers();

        document.getElementById('pagoCliente').value = "";
        document.getElementById('cantidad').value = "1";
        document.getElementById('descuento').value = "0";
        document.getElementById('cantidad').focus();
        calcularPreciosBase();
    }

    // Cola para evitar que múltiples checks simultáneos se pisen en JSONBin
    let _colaListos = [];
    let _procesandoCola = false;

    function normalizarTexto(txt) {
        return (txt || "").trim().toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function normalizarTelefono(tel) {
        return (tel || "").replace(/\D/g, "");
    }

    // Misma fórmula que usa la app de clientes, para que el crédito de
    // un mismo cliente quede siempre bajo la misma llave en ambas apps.
    function getClienteKey(nombreCliente, telefonoCliente) {
        const nombreKey = normalizarTexto(nombreCliente);
        const telKey = normalizarTelefono(telefonoCliente);
        return telKey ? `${nombreKey}__${telKey}` : nombreKey;
    }

    function normalizarNombre(txt) {
        return normalizarTexto(txt);
    }

    // Config de crédito y referidos: debe coincidir siempre con la app de clientes
    const CREDITO_CONFIG = {
        pedidosPorNivel: 10,
        montosPorNivel: [100, 200, 300],
        montoMaximo: 300
    };
    const REFERIDO_CONFIG = {
        montoReferente: 50,
        montoReferido: 0
    };

    function generarCodigoDesdeNormalizados(nombreNorm, telNorm) {
        const base = (nombreNorm.split(' ')[0] || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6) || 'AMIGO';
        const sufijo = (telNorm || '').slice(-4) || '0000';
        return base + sufijo;
    }

    function codigoDesdeClaveCliente(key) {
        const partes = key.split('__');
        return generarCodigoDesdeNormalizados(partes[0] || '', partes[1] || '');
    }

    function buscarClaveClientePorCodigo(clientesNube, codigo) {
        const codigoBuscado = (codigo || '').trim().toUpperCase();
        if (!codigoBuscado) return null;
        for (const key in clientesNube) {
            if (codigoDesdeClaveCliente(key) === codigoBuscado) return key;
        }
        return null;
    }

    // Nombre "bonito" para mostrar en pantalla a partir de la llave normalizada
    // (la llave no guarda mayúsculas/acentos, así que solo se aproxima).
    function nombreDesdeClave(key) {
        const nombreNorm = key.split('__')[0] || '';
        return nombreNorm.replace(/\b\w/g, c => c.toUpperCase());
    }
    function telefonoDesdeClave(key) {
        return key.split('__')[1] || '';
    }

    async function procesarColaListos() {
        if (_procesandoCola || _colaListos.length === 0) return;
        _procesandoCola = true;

        try {
            const res = await fetch(`${FIREBASE_URL}/db.json`);
            const record = await res.json() || {};
            const esFormatoNuevo = !Array.isArray(record);
            let pedidosNube = esFormatoNuevo ? (record.pedidos || []) : record;
            const clientesNube = esFormatoNuevo ? (record.clientes || {}) : {};

            // Aplicar todos los IDs pendientes de una sola vez
            while (_colaListos.length > 0) {
                const id = _colaListos.shift();
                const pedidoNube = pedidosNube.find(p => p.id === id);
                if (!pedidoNube) continue;

                // Marcar listo
                pedidoNube.listo = true;

                // Sumar punto al cliente si tiene nombre y no fue ya contado.
                // "puntosContados" es una bandera compartida con la app de clientes:
                // si cualquiera de las dos apps ya lo procesó, la otra no lo repite.
                const nombreCliente = pedidoNube.cliente;
                if (nombreCliente && !pedidoNube.puntosContados) {
                    pedidoNube.puntosContados = true;
                    const key = getClienteKey(nombreCliente, pedidoNube.telefono);
                    if (!clientesNube[key]) clientesNube[key] = { pedidos: 0, credito: 0 };
                    clientesNube[key].pedidos = (clientesNube[key].pedidos || 0) + 1;

                    // Recompensa por referido, solo en el primer pedido del referido
                    if (clientesNube[key].pedidos === 1 && pedidoNube.codigoReferido && !clientesNube[key].referidoPagado) {
                        const keyReferente = buscarClaveClientePorCodigo(clientesNube, pedidoNube.codigoReferido);
                        if (keyReferente && keyReferente !== key) {
                            if (!clientesNube[keyReferente]) clientesNube[keyReferente] = { pedidos: 0, credito: 0 };
                            clientesNube[keyReferente].credito = Math.min(
                                (clientesNube[keyReferente].credito || 0) + REFERIDO_CONFIG.montoReferente,
                                CREDITO_CONFIG.montoMaximo
                            );
                            clientesNube[key].credito = Math.min(
                                (clientesNube[key].credito || 0) + REFERIDO_CONFIG.montoReferido,
                                CREDITO_CONFIG.montoMaximo
                            );
                        }
                        clientesNube[key].referidoPagado = true;
                    }

                    // Ver si gana crédito por nivel
                    const totalPedidos = clientesNube[key].pedidos;
                    const nivel = Math.floor(totalPedidos / CREDITO_CONFIG.pedidosPorNivel);
                    if (nivel > 0 && totalPedidos % CREDITO_CONFIG.pedidosPorNivel === 0) {
                        const idx = Math.min(nivel - 1, CREDITO_CONFIG.montosPorNivel.length - 1);
                        const ganado = CREDITO_CONFIG.montosPorNivel[idx];
                        clientesNube[key].credito = Math.min(
                            (clientesNube[key].credito || 0) + ganado,
                            CREDITO_CONFIG.montoMaximo
                        );
                    }
                }
            }

            await fetch(`${FIREBASE_URL}/db.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidos: pedidosNube, clientes: clientesNube })
            });
        } catch(err) {
            console.log("Error al sincronizar listos con la nube:", err);
        }

        _procesandoCola = false;
        if (_colaListos.length > 0) procesarColaListos();
    }

    function marcarVoucherListo(id) {
        const voucher = historialVouchers.find(v => v.id === id);
        if (!voucher || voucher.listo) return;

        voucher.listo = true;
        try { localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers)); } catch(e){}
        renderizarVouchers();

        // Encolar y procesar
        _colaListos.push(id);
        procesarColaListos();
    }

    function avisarClienteWhatsApp(id) {
        const voucher = historialVouchers.find(v => v.id === id);
        if (!voucher || !voucher.telefono) return;
        const nombre = voucher.cliente ? voucher.cliente.split(' ')[0] : 'cliente';
        const telefono = voucher.telefono.replace(/[^0-9]/g, '');
        const mensaje = encodeURIComponent(
            'Hola ' + nombre + ', tu pedido #' + id + ' en Mi Centro de Impresion ya esta listo para retirar! Te esperamos.'
        );
        window.open('https://wa.me/506' + telefono + '?text=' + mensaje, '_blank');
    }

    function eliminarVoucherIndividual(id) {
        if (confirm(`¿Eliminar Ticket #${id}?`)) {
            historialVouchers = historialVouchers.filter(v => v.id !== id);
            try { localStorage.setItem('historialVouchers', JSON.stringify(historialVouchers)); } catch(e){}
            renderizarVouchers();
        }
    }

    function limpiarHistorial() {
        if (confirm("¿Estás seguro de que deseas borrar TODO el historial de la pantalla? Las ventas del día volverán a ₡0.")) {
            historialVouchers = [];
            try { localStorage.removeItem('historialVouchers'); } catch(e){}
            renderizarVouchers();
        }
    }

    function imprimirVoucher(id) {
        const ticketDiv = document.getElementById(`ticket-${id}`);
        if (!ticketDiv) return;
        ticketDiv.classList.add('print-active');
        window.print();
        setTimeout(() => { ticketDiv.classList.remove('print-active'); }, 500);
    }

    // ── PANEL DE CLIENTES ─────────────────────────────────────────
    let _clientesCache = {};

    async function abrirPanelClientes() {
        const overlay = document.getElementById('overlayClientes');
        overlay.classList.add('visible');
        document.getElementById('buscarCliente').value = '';
        document.getElementById('listaClientes').innerHTML = '<div class="empty-msg">Cargando...</div>';
        try {
            const res = await fetch(`${FIREBASE_URL}/db.json`);
            const record = await res.json() || {};
            _clientesCache = (Array.isArray(record) ? {} : (record.clientes || {}));
        } catch (e) {
            _clientesCache = {};
        }
        renderizarListaClientes();
        document.getElementById('buscarCliente').focus();
    }

    function cerrarPanelClientes() {
        document.getElementById('overlayClientes').classList.remove('visible');
    }

    function renderizarListaClientes() {
        const contenedor = document.getElementById('listaClientes');
        const busqueda = normalizarTexto(document.getElementById('buscarCliente').value);

        const claves = Object.keys(_clientesCache)
            .filter(key => !busqueda || key.includes(busqueda))
            .sort((a, b) => nombreDesdeClave(a).localeCompare(nombreDesdeClave(b)));

        if (claves.length === 0) {
            contenedor.innerHTML = '<div class="empty-msg">No se encontraron clientes.</div>';
            return;
        }

        contenedor.innerHTML = claves.map(key => {
            const c = _clientesCache[key];
            const nombre = nombreDesdeClave(key);
            const telefono = telefonoDesdeClave(key);
            return `
                <div class="fila-cliente" id="fila-${key}">
                    <div class="fila-cliente-info">
                        <div class="fila-cliente-nombre">${nombre}</div>
                        <div class="fila-cliente-datos">${telefono || 'sin teléfono'} · ${c.pedidos || 0} pedido(s)</div>
                    </div>
                    <div class="fila-cliente-credito" id="credito-${key}">₡${(c.credito || 0).toLocaleString('es-CR')}</div>
                    <div class="fila-cliente-acciones">
                        <input type="number" class="input-ajuste-credito" id="ajuste-${key}" placeholder="₡" min="0">
                        <button class="btn-ajuste-credito sumar" onclick="ajustarCreditoCliente('${key}', 1)" title="Agregar crédito">+</button>
                        <button class="btn-ajuste-credito restar" onclick="ajustarCreditoCliente('${key}', -1)" title="Quitar crédito">−</button>
                        <button class="btn-borrar-cliente" onclick="borrarCliente('${key}')" title="Eliminar cliente">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function ajustarCreditoCliente(key, signo) {
        const input = document.getElementById(`ajuste-${key}`);
        const monto = parseFloat(input.value) || 0;
        if (monto <= 0) { alert("Escribí un monto en colones primero."); return; }

        try {
            const res = await fetch(`${FIREBASE_URL}/db.json`);
            const record = await res.json() || {};
            const esFormatoNuevo = !Array.isArray(record);
            const pedidosNube = esFormatoNuevo ? (record.pedidos || []) : [];
            const clientesNube = esFormatoNuevo ? (record.clientes || {}) : {};

            if (!clientesNube[key]) clientesNube[key] = { pedidos: 0, credito: 0 };
            clientesNube[key].credito = Math.max(0, (clientesNube[key].credito || 0) + (signo * monto));

            await fetch(`${FIREBASE_URL}/db.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidos: pedidosNube, clientes: clientesNube })
            });

            _clientesCache = clientesNube;
            input.value = '';
            renderizarListaClientes();

            // Confirmación visual clara de que sí se guardó
            const fila = document.getElementById(`fila-${key}`);
            if (fila) {
                fila.classList.add('guardado-flash');
                setTimeout(() => fila.classList.remove('guardado-flash'), 900);
            }
        } catch (e) {
            alert("No se pudo guardar el ajuste de crédito. Revisá tu conexión.");
        }
    }

    async function borrarCliente(key) {
        const nombre = nombreDesdeClave(key);
        if (!confirm(`¿Eliminar a "${nombre}" de la lista de clientes? Se borra su historial de pedidos contados y su crédito acumulado. Esto no se puede deshacer.`)) return;

        try {
            const res = await fetch(`${FIREBASE_URL}/db.json`);
            const record = await res.json() || {};
            const esFormatoNuevo = !Array.isArray(record);
            const pedidosNube = esFormatoNuevo ? (record.pedidos || []) : [];
            const clientesNube = esFormatoNuevo ? (record.clientes || {}) : {};

            delete clientesNube[key];

            await fetch(`${FIREBASE_URL}/db.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidos: pedidosNube, clientes: clientesNube })
            });

            _clientesCache = clientesNube;
            renderizarListaClientes();
        } catch (e) {
            alert("No se pudo eliminar al cliente. Revisá tu conexión.");
        }
    }

    async function agregarClienteManual() {
        const nombre = document.getElementById('nuevoClienteNombre').value.trim();
        const telefono = document.getElementById('nuevoClienteTelefono').value.trim();
        if (!nombre) { alert("Escribí al menos el nombre del cliente."); return; }

        const key = getClienteKey(nombre, telefono);

        try {
            const res = await fetch(`${FIREBASE_URL}/db.json`);
            const record = await res.json() || {};
            const esFormatoNuevo = !Array.isArray(record);
            const pedidosNube = esFormatoNuevo ? (record.pedidos || []) : [];
            const clientesNube = esFormatoNuevo ? (record.clientes || {}) : {};

            if (!clientesNube[key]) clientesNube[key] = { pedidos: 0, credito: 0 };

            await fetch(`${FIREBASE_URL}/db.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pedidos: pedidosNube, clientes: clientesNube })
            });

            _clientesCache = clientesNube;
            document.getElementById('nuevoClienteNombre').value = '';
            document.getElementById('nuevoClienteTelefono').value = '';
            renderizarListaClientes();
        } catch (e) {
            alert("No se pudo agregar al cliente. Revisá tu conexión.");
        }
    }

    document.getElementById('cantidad').addEventListener('input', calcularPreciosBase);
</script>
